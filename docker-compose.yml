services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - CONNECTION_URI=mongodb://mongo
    depends_on:
      - mongo
      - garage
    networks:
      default: {}
      # The bot dials the SoTFR api's /modmail socket.io namespace as an outbound
      # client over this shared network (DASHBOARD_API_URL, e.g. http://sotfr-api:4000).
      modmail-shared: {}

  logviewer:
    image: ghcr.io/modmail-dev/logviewer:master
    restart: always
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo
    ports:
      - 80:8000

  mongo:
    image: mongo
    restart: always
    # Expose MongoDB on the host for local testing/inspection (e.g. mongosh,
    # Compass). Bound to 127.0.0.1 so it is not reachable from outside this host.
    ports:
      - "127.0.0.1:27018:27017"
    networks:
      default: {}
      # Cross-project access (e.g. the SoTFR api) reaches this as
      # bot-modmail-mongo-1:27017 over the shared modmail-shared network.
      modmail-shared:
        aliases:
          - bot-modmail-mongo-1
    volumes:
      - mongodb:/data/db

  garage:
    image: dxflrs/garage:v2.3.0
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./docker/garage.toml:/etc/garage.toml
    ports:
      - "9101:9000"   # S3 API (authenticated) — bot uploads + bucket management
      - "9201:3902"   # Web endpoint (anonymous read) — log viewer / browsers
      - "3904:3903"   # Admin API
    command: [ "./garage", "-c", "/etc/garage.toml", "server" ]
    restart: unless-stopped

volumes:
  mongodb:
  garage_data:
  garage_meta:

networks:
  # Shared with external compose projects (e.g. the SoTFR api) so they can reach
  # MongoDB as bot-modmail-mongo-1:27017. Create it once with:
  #   docker network create modmail-shared
  modmail-shared:
    external: true
